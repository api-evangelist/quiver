apis:
  - aid: quiver:quiver
    name: Quiver Quantitative API
    description: >-
      The Quiver Quantitative API provides REST access to alternative financial datasets
      including Congressional and Senate stock trading, insider transactions, lobbying
      disclosures, government contracts, corporate patents, executive compensation,
      institutional holdings, ETF holdings, top shareholders, off-exchange activity,
      app ratings, and the Quiver newsfeed. Endpoints are available for both bulk historical
      datasets and live ticker-specific lookups, organized under versioned paths such
      as /beta and /v1.
