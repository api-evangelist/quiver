aid: quiver
name: Quiver Quantitative
description: >-
  Quiver Quantitative is an alternative-data platform that aggregates non-traditional
  financial datasets and exposes them through a single API. The platform covers congressional
  and Senate trading, insider trading, lobbying activity, government contracts, corporate
  patents, executive compensation, institutional and ETF holdings, off-exchange activity,
  app ratings, and more, giving developers and quantitative researchers programmatic
  access to alternative data signals starting at $10 per month.
